<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Admin | MetaDados Remover</title>
    <style>
      :root { font-family: Inter, Arial, sans-serif; color-scheme: light dark; }
      body { margin: 0; background: #0e1118; color: #f3f4f7; }
      main { max-width: 1100px; margin: 0 auto; padding: 16px; }
      .card { background: #171c28; border-radius: 12px; padding: 12px; margin-bottom: 14px; }
      .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
      button, select { border: 0; border-radius: 8px; padding: 8px 10px; }
      button { background: #2c76ff; color: #fff; cursor: pointer; font-weight: 600; }
      button.secondary { background: #253046; }
      table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
      th, td { border-bottom: 1px solid #2b3342; padding: 8px; text-align: left; vertical-align: top; }
      .muted { color: #a4adbd; }
      .ok { color: #8be28b; }
      .err { color: #ff9797; }
      code { background: #111520; padding: 1px 4px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <main>
      <h1>Dashboard administrativo</h1>
      <p class="muted">Visão privada dos uploads recebidos. Arquivos expiram automaticamente conforme TTL.</p>

      <section class="card">
        <div class="row">
          <button id="refresh">Atualizar lotes</button>
          <label>
            Lote:
            <select id="batchSelect"></select>
          </label>
          <button id="loadBatch" class="secondary">Ver detalhes</button>
          <span id="status" class="muted"></span>
        </div>
      </section>

      <section class="card">
        <h3>Lotes recentes</h3>
        <div id="batches"></div>
      </section>

      <section class="card">
        <h3>Arquivos do lote selecionado</h3>
        <div id="jobs"></div>
      </section>
    </main>

    <script src="/admin.js"></script>
  </body>
</html>
